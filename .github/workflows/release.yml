name: Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (e.g., v0.4.0). If empty, uses package.json version.'
        required: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - name: Install language server dependencies
        run: |
          cd packages/pml-language-server
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - run: npm run compile
      - name: Compute release tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Ensure tag exists on origin
        shell: bash
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag "$TAG"
            echo "Created tag $TAG"
          fi
          # Push tag if missing on remote
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on origin"
          else
            git push origin "refs/tags/$TAG"
          fi
      - name: Package VSIX
        run: npm run pack
      - name: Validate VSIX package
        shell: bash
        run: |
          VSIX="$(ls pml-aveva-e3d-*.vsix | head -n 1)"
          SIZE="$(stat -c %s "$VSIX")"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "VSIX too large: $SIZE bytes"
            exit 1
          fi
          if unzip -Z1 "$VSIX" | grep -q '^extension/manuals/'; then
            echo "VSIX unexpectedly contains manuals/"
            exit 1
          fi
      - name: Compute VSIX checksum
        id: checksum
        shell: bash
        run: |
          VSIX="$(ls pml-aveva-e3d-*.vsix | head -n 1)"
          SHA="$(sha256sum "$VSIX" | awk '{print $1}')"
          echo "$SHA  $VSIX" > "$VSIX.sha256"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: Build release notes
        shell: bash
        env:
          RELEASE_SHA: ${{ steps.checksum.outputs.sha }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          body = Path("RELEASE_NOTES.md").read_text(encoding="utf-8")
          new_body, replacements = re.subn(
              r"SHA256: `[^`]+`",
              f"SHA256: `{os.environ['RELEASE_SHA']}`",
              body,
          )
          if replacements == 0:
              raise SystemExit("SHA256 placeholder not found in RELEASE_NOTES.md")
          Path("release-body.md").write_text(new_body, encoding="utf-8")
          PY
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: |
            *.vsix
            *.vsix.sha256
      - name: Create GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          files: |
            *.vsix
            *.vsix.sha256
          generate_release_notes: true
          body_path: release-body.md
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
      - name: Determine VSCE PAT
        id: vsce
        shell: bash
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$VSCE_TOKEN" ]; then
            echo "pat=$VSCE_TOKEN" >> $GITHUB_OUTPUT
          elif [ -n "$VSCE_PAT" ]; then
            echo "pat=$VSCE_PAT" >> $GITHUB_OUTPUT
          else
            echo "pat=" >> $GITHUB_OUTPUT
          fi
      - name: Publish to VS Code Marketplace (optional)
        if: ${{ steps.vsce.outputs.pat != '' }}
        env:
          VSCE_PAT: ${{ steps.vsce.outputs.pat }}
        run: npx @vscode/vsce publish --packagePath *.vsix --no-yarn


