name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - name: Install language server dependencies
        run: |
          cd packages/pml-language-server
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - run: npm run compile:tsc
      - run: npm run lint
      - run: npx eslint packages/pml-language-server/src --ext ts
      - run: npm --prefix packages/pml-language-server run test -- --run
      - run: npm run compile
      - run: npm run pack
      - name: Validate VSIX package
        shell: bash
        run: |
          VSIX="$(ls pml-aveva-e3d-*.vsix | head -n 1)"
          SIZE="$(stat -c %s "$VSIX")"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "VSIX too large: $SIZE bytes"
            exit 1
          fi
          if unzip -Z1 "$VSIX" | grep -q '^extension/manuals/'; then
            echo "VSIX unexpectedly contains manuals/"
            exit 1
          fi
