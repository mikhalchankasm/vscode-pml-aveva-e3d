name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - name: Install language server dependencies
        run: |
          cd packages/pml-language-server
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - run: npm run compile:tsc
      - run: npm run lint
      - run: npx eslint packages/pml-language-server/src --ext ts
      - run: npm --prefix packages/pml-language-server run test -- --run
      - run: npm run compile
      - run: npm run pack
